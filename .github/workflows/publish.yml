name: Publish beta to npm

on:
  push:
    branches: [main]
    paths:
      - "packages/serve-sim/**"
      - ".github/workflows/publish.yml"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  publish-beta:
    if: github.repository == 'EvanBacon/serve-sim' && github.ref == 'refs/heads/main'
    runs-on: macos-26
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Detect serve-sim changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "sim=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Publish beta if serve-sim source changed.
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          SOURCE_CHANGED=false
          if echo "$CHANGED" | grep -Eq "^packages/serve-sim/"; then
            SOURCE_CHANGED=true
          fi

          if [ "$SOURCE_CHANGED" = "true" ]; then
            echo "sim=true" >> $GITHUB_OUTPUT
          else
            echo "sim=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup bun
        if: steps.changes.outputs.sim == 'true'
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        if: steps.changes.outputs.sim == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        if: steps.changes.outputs.sim == 'true'
        run: bun install --frozen-lockfile

      - name: Boot iOS simulator for serve-sim tests
        if: steps.changes.outputs.sim == 'true'
        id: boot-sim
        run: |
          # Pick the newest available iOS simulator device. The runner image
          # ships pre-created sims - boot one so the serve-sim idle-floor
          # integration test has something real to talk to. Fallback: create
          # one from the latest iOS runtime.
          UDID=$(xcrun simctl list devices available -j | node -e "
            const data = JSON.parse(require('fs').readFileSync(0, 'utf-8'));
            const iosRuntimes = Object.keys(data.devices).filter(r => r.includes('iOS'));
            iosRuntimes.sort().reverse();
            for (const runtime of iosRuntimes) {
              for (const d of data.devices[runtime]) {
                if (d.isAvailable && d.name.includes('iPhone')) {
                  console.log(d.udid);
                  process.exit(0);
                }
              }
            }
          ")
          if [ -z "$UDID" ]; then
            echo "No pre-created iOS simulator found; creating one from the latest runtime"
            RUNTIME=$(xcrun simctl list runtimes -j | node -e "
              const data = JSON.parse(require('fs').readFileSync(0, 'utf-8'));
              const ios = data.runtimes.filter(r => r.isAvailable && r.identifier.includes('iOS'));
              ios.sort((a, b) => a.version.localeCompare(b.version));
              console.log(ios[ios.length - 1].identifier);
            ")
            DEVICETYPE=$(xcrun simctl list devicetypes -j | node -e "
              const data = JSON.parse(require('fs').readFileSync(0, 'utf-8'));
              const iphones = data.devicetypes.filter(d => d.identifier.includes('iPhone'));
              console.log(iphones[iphones.length - 1].identifier);
            ")
            UDID=$(xcrun simctl create "ci-test-iphone" "$DEVICETYPE" "$RUNTIME")
          fi
          echo "Booting simulator $UDID"
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b
          open -ga Simulator || true
          echo "udid=$UDID" >> $GITHUB_OUTPUT

      # The serve-sim e2e tests load the in-process native addon
      # (dist/native/serve-sim-native.node), so build it before running them.
      # (The publish step below rebuilds after the version bump to embed it.)
      - name: Build serve-sim
        if: steps.changes.outputs.sim == 'true'
        run: bun run build.ts
        working-directory: packages/serve-sim

      - name: serve-sim tests (idle floor regression)
        if: steps.changes.outputs.sim == 'true'
        env:
          UDID: ${{ steps.boot-sim.outputs.udid }}
        run: |
          # Mirror sim-test.yml: the sim-backed e2e tests share one simulator,
          # so a wedge from one test (stuck finger, native crash) cascades into
          # ConnectionRefused / "server not alive" failures in unrelated later
          # tests. Reboot for a clean slate and retry once — a transient wedge
          # clears, a genuine regression reproduces on the second run.
          run_tests() { bun test packages/serve-sim/src/__tests__/; }
          if run_tests; then exit 0; fi
          echo "::warning title=sim e2e retry::test run failed; rebooting $UDID and retrying once"
          xcrun simctl shutdown "$UDID" 2>/dev/null || true
          sleep 3
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b || true
          open -ga Simulator || true
          run_tests

      - name: Shutdown simulator
        if: always() && steps.boot-sim.outputs.udid != ''
        run: |
          xcrun simctl shutdown "${{ steps.boot-sim.outputs.udid }}" || true

      - name: Build and publish serve-sim beta
        if: steps.changes.outputs.sim == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd packages/serve-sim

          # Publish a unique prerelease from max(local, npm latest) + 1.
          # This keeps automatic main pushes on npm's beta tag until stable
          # promotion is requested explicitly.
          LOCAL=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view serve-sim dist-tags.latest 2>/dev/null || echo "")
          [ -z "$PUBLISHED" ] && PUBLISHED="$LOCAL"
          NEW=$(node -e "
            const a='$LOCAL'.split('.').map(Number);
            const b='$PUBLISHED'.split('.').map(Number);
            const max=(a[0]>b[0]||(a[0]===b[0]&&a[1]>b[1])||(a[0]===b[0]&&a[1]===b[1]&&a[2]>b[2]))?a:b;
            max[2]++;
            console.log(max.join('.') + '-beta.${{ github.run_number }}.${{ github.run_attempt }}');
          ")
          echo "Bumped serve-sim: local=$LOCAL npm=$PUBLISHED -> $NEW"
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json'));
            p.version = '$NEW';
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "

          bun run build

          npm publish --access public --tag beta --provenance
